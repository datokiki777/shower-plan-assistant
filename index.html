<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Shower Plan Assistant</title>
  <meta name="description" content="Manual Georgian shower work report and PDF export." />
  <meta name="theme-color" content="#0e5c56" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="icons/favicon.png" />
  <link rel="stylesheet" href="css/styles.css" />
  <script defer src="js/app.js"></script>
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Manual Georgian report</p>
        <h1>Shower Plan Assistant</h1>
      </div>
    </header>

    <section class="workspace manual-workspace">
      <section class="report-panel manual-report-panel">
        <div class="report-toolbar">
          <div>
            <p class="eyebrow">ქართული ანგარიში</p>
            <h2 id="reportTitle">ახალი სამუშაო</h2>
          </div>
          <div class="toolbar-actions">
            <button type="button" id="clearBtn">გასუფთავება</button>
            <button type="button" id="saveBtn">შენახვა</button>
            <button class="primary" type="button" id="exportBtn">PDF export</button>
          </div>
        </div>

        <div class="alert" id="alertBox" hidden></div>

        <form id="reportForm" class="report-grid">
          <section class="form-card">
            <h3>კლიენტის მონაცემები</h3>
            <label>სახელი და გვარი <input name="clientName" /></label>
            <label>მისამართი <textarea name="address" rows="2"></textarea></label>
            <label>ტელეფონი <input name="phone" /></label>
          </section>

          <section class="form-card">
            <h3>პაკეტი და დუშთასე</h3>
            <div class="two-col">
              <label>პაკეტი S/M <input name="packageType" /></label>
              <label>ანტირუჩი <input name="antiSlip" /></label>
            </div>
            <label>დუშთასეს ზომა <input name="showerTraySize" /></label>
          </section>

          <section class="form-card">
            <h3>მასალები</h3>
            <div class="two-col">
              <label>შუშის ზომა <input name="glassPartitionSize" /></label>
              <label>დასაკიდი კარის ზომა <input name="hingedDoorSize" /></label>
            </div>
            <label>პანელის ფერი <input name="panelColor" /></label>
            <label>პანელი სადამდე კეთდება <input name="panelHeight" /></label>
            <label>დასაყენებლების სია <textarea name="installables" rows="4"></textarea></label>
          </section>

          <section class="form-card">
            <h3>დამატებითი სამუშაოები და შენიშვნები</h3>
            <label>დამატებითი სამუშაოები <textarea name="extraWork" rows="4"></textarea></label>
            <label>სამუშაო შენიშვნები <textarea name="workNotes" rows="4"></textarea></label>
          </section>
        </form>

        <section class="history manual-history">
          <div class="section-head">
            <h2>ისტორია</h2>
            <button type="button" id="clearHistoryBtn">წაშლა</button>
          </div>
          <div id="historyList" class="history-list"></div>
        </section>
      </section>
    </section>
  </main>
</body>
</html>
